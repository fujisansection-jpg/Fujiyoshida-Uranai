<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日の占いin富士吉田</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 全体デザイン --- */
        body {
            font-family: 'Noto Sans JP', sans-serif;
            text-align: center;
            background-color: #f0faff;
            background-image: linear-gradient(135deg, #f0faff 0%, #fff0f5 100%);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #title-container {
            margin-bottom: 20px;
            padding: 10px 30px;
            background-color: white;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        h1 { font-size: 1.5rem; color: #0077ee; margin: 0; }

        .content-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        /* --- 画像切り替えエリア --- */
        #char-image-container {
            width: 100%;
            max-width: 300px;
            height: 400px;
            position: relative;
        }
        
        #char-image-container img {
            width: 100%;
            height: auto;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        
        #char-image-container img.active { opacity: 1; }

        /* --- ふわふわ吹き出し --- */
        #fortune-speech-bubble {
            position: relative;
            background-color: #fffacd;
            padding: 30px 40px;
            border-radius: 50% 50% 50% 20%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 3px solid #ffb6c1;
            margin-top: -50px;
            margin-bottom: 30px;
            z-index: 5;
            font-size: 1.2rem;
            line-height: 1.4;
        }

        #fortune-result {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff69b4;
            display: block;
            margin-top: 5px;
        }

        /* --- ラッキースポットエリア --- */
        #lucky-spot-container {
            width: 90%;
            max-width: 400px;
            background-color: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 3px solid #ffb6c1;
        }

        #lucky-spot-label { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
        
        #lucky-spot-link {
            font-size: 1.2rem;
            font-weight: bold;
            color: #0077ee;
            text-decoration: none;
            display: inline-block;
            padding: 10px;
            background-color: #e0f2ff;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div id="title-container">
        <h1>🗻 今日の占いin富士吉田 🗻</h1>
    </div>

    <div class="content-wrapper">
        <div id="char-image-container">
            <img id="image1" src="image_1.png" alt="占いキャラクター" class="active">
            <img id="image2" src="image_2.png" alt="占いキャラクター">
        </div>
        
        <div id="fortune-speech-bubble">
            あなたの運勢は
            <span id="fortune-result">...</span>
        </div>
    </div>

    <div id="lucky-spot-container">
        <div id="lucky-spot-label">今日のラッキースポット</div>
        <a id="lucky-spot-link" href="#" target="_blank">...</a>
    </div>

    <script>
        const fortunes = ["大吉", "中吉", "小吉", "吉", "末吉", "凶", "大凶"];
        const spots = [
            { name: "北口本宮冨士浅間神社", url: "https://fujiyoshida.net/spot/23" },
            { name: "鐘山の滝", url: "https://fujiyoshida.net/spot/33" },
            { name: "富士山レーダードーム", url: "https://fujiyoshida.net/spot/13" },
            { name: "ふじさんミュージアム", url: "https://fujiyoshida.net/spot/15" },
            { name: "中ノ茶屋", url: "https://fujiyoshida.net/spot/52" },
            { name: "ディアディア", url: "https://fujiyoshida.net/feature/DEAR%20DEER/DEAR%20DEER" },
            { name: "明見湖", url: "https://fujiyoshida.net/spot/30" },
            { name: "西裏", url: "https://fujiyoshida.net/feature/nishiura/index" },
            { name: "パインズパーク", url: "https://fujiyoshida.net/spot/18" },
            { name: "恩賜林公園", url: "https://fujiyoshida.net/feature/onshirin/index" },
            { name: "小室浅間神社", url: "https://fujiyoshida.net/spot/29" },
            { name: "新屋山神社", url: "https://fujiyoshida.net/spot/34" },
            { name: "農村公園", url: "https://fujiyoshida.net/spot/40" },
            { name: "馬刺しが買える精肉店", url: "https://fujiyoshida.net/gourmet/list?sortType=access&listStyle=tile&latitude=&longitude=&keyword=%E9%A6%AC%E5%88%BA&category_m%5B%5D=18#searchResultArea" },
            { name: "富士山形のグルメ＆スイーツ店", url: "https://fujiyoshida.net/feature/fujisan_gourmet/index" },
            { name: "美味しいアイス屋さん", url: "https://fujiyoshida.net/feature/fujiyoshida_icecream/fujiyoshida_icecream" },
            { name: "おしゃれなカフェ", url: "https://fujiyoshida.net/feature/fujiyoshida_cafe/fujiyoshida_cafe" },
            { name: "地酒が買える酒屋さん", url: "https://fujiyoshida.net/feature/fujiyoshida_osake/fujiyoshida_osake" },
            { name: "日帰り温泉", url: "https://fujiyoshida.net/feature/winter-hot-spring/winter-hot-spring" },
            { name: "見るだけでも楽しい雑貨屋さん", url: "https://fujiyoshida.net/feature/fujiyoshida_zakka/fujiyoshida_zakka" }
        ];

        function runFortune() {
            document.getElementById('fortune-result').innerText = fortunes[Math.floor(Math.random() * fortunes.length)];
            const spot = spots[Math.floor(Math.random() * spots.length)];
            const linkEl = document.getElementById('lucky-spot-link');
            linkEl.innerText = spot.name;
            linkEl.href = spot.url;

            // 1秒ごとの画像切り替え
            const img1 = document.getElementById('image1');
            const img2 = document.getElementById('image2');
            setInterval(() => {
                img1.classList.toggle('active');
                img2.classList.toggle('active');
            }, 1000);
        }

        window.onload = runFortune;
    </script>
</body>
</html>
